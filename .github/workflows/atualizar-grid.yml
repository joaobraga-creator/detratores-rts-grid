name: Atualizar Grid - Detratores RTS

on:
  schedule:
    - cron: '0 * * * *'   # toda hora, no minuto 0
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Configurar credenciais Google
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > /tmp/gcp-credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-credentials.json" >> $GITHUB_ENV

      - name: Criar pasta de output
        run: mkdir -p output/grid-datasets

      - name: Rodar query BigQuery e gerar datasets
        env:
          BQ_PROJECT_ID: meli-bi-data
          BQ_LOCATION: US
          GRID_DOC_ID: 01KVR65T6TXSTK9FQERHAC8VET
        run: node build-detratores-rts-grid.js

      - name: Publicar datasets no Grid
        env:
          GRID_TOKEN: ${{ secrets.GRID_TOKEN }}
          GRID_DOC_ID: 01KVR65T6TXSTK9FQERHAC8VET
        run: node grid_dataset_publish_all.mjs
