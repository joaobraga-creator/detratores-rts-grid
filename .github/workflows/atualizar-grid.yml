name: Atualizar Grid - Detratores RTS

on:
  schedule:
    - cron: '0 * * * *'   # toda hora, no minuto 0
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  atualizar:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Configurar credenciais Google
        shell: pwsh
        run: |
          $credPath = "$env:RUNNER_TEMP\gcp-credentials.json"
          [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}")) | Set-Content $credPath -Encoding UTF8
          "GOOGLE_APPLICATION_CREDENTIALS=$credPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding UTF8

      - name: Criar pasta de output
        run: mkdir -p output/grid-datasets

      - name: Rodar query BigQuery e gerar datasets
        env:
          BQ_PROJECT_ID: meli-bi-data
          BQ_LOCATION: US
          GRID_DOC_ID: 01KVR65T6TXSTK9FQERHAC8VET
        run: node build-detratores-rts-grid.js

      - name: Publicar datasets no Grid
        env:
          GRID_TOKEN: ${{ secrets.GRID_TOKEN }}
          GRID_DOC_ID: 01KVR65T6TXSTK9FQERHAC8VET
        run: node grid_dataset_publish_all.mjs
